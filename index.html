<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LLM 양자화 수준과 고등학교 과학 문항 해결 성능</title>
  <!-- 단일 파일 버전: CSS와 JS가 모두 이 HTML 안에 포함되어 GitHub Pages에서 파일 누락 문제가 없습니다. -->
  <meta name="description" content="발표자와 상호작용하는 정적 웹 프레젠테이션" />
  <style>
:root {
  --bg: #050505;
  --fg: #f5f5f0;
  --muted: #9b9b94;
  --line: rgba(255,255,255,.14);
  --panel: rgba(255,255,255,.055);
  --panel2: rgba(255,255,255,.09);
  --accent: #ffffff;
  --danger: #ff6b6b;
  --ok: #d7ff7f;
  --blue: #9ec5ff;
  --shadow: 0 30px 90px rgba(0,0,0,.55);
  --radius: 28px;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
}
* { box-sizing: border-box; }
html, body { margin:0; height:100%; background:var(--bg); color:var(--fg); overflow:hidden; }
body::before {
  content:""; position:fixed; inset:-30%; pointer-events:none;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.12), transparent 26%),
    radial-gradient(circle at 80% 50%, rgba(255,255,255,.08), transparent 24%),
    linear-gradient(120deg, rgba(255,255,255,.04), transparent 45%);
  filter: blur(5px);
}
button { font:inherit; color:inherit; }
.app { position:relative; display:grid; grid-template-columns: 72px 1fr 360px; grid-template-rows: 64px 1fr; height:100vh; }
.topbar { grid-column:1 / 4; grid-row:1; display:flex; align-items:center; justify-content:space-between; padding:0 22px; border-bottom:1px solid var(--line); backdrop-filter: blur(24px); background:rgba(5,5,5,.68); z-index:20; }
.brand { display:flex; align-items:center; gap:10px; letter-spacing:.02em; font-weight:650; }
.brand-dot { width:10px; height:10px; border-radius:50%; background:var(--fg); box-shadow:0 0 24px var(--fg); }
.icon-btn, .pill-btn { border:1px solid var(--line); background:rgba(255,255,255,.055); border-radius:999px; cursor:pointer; transition:.2s ease; }
.icon-btn { width:38px; height:38px; }
.pill-btn { padding:9px 14px; font-size:13px; }
.icon-btn:hover, .pill-btn:hover { background:rgba(255,255,255,.16); transform:translateY(-1px); }
.topbar-actions { display:flex; gap:8px; align-items:center; }
.rail { grid-column:1; grid-row:2; border-right:1px solid var(--line); padding:16px 10px; display:flex; flex-direction:column; gap:9px; overflow:auto; background:rgba(0,0,0,.18); z-index:10; }
.rail button { width:48px; min-height:38px; border:1px solid transparent; border-radius:14px; background:transparent; color:var(--muted); cursor:pointer; }
.rail button.active { border-color:var(--fg); color:var(--fg); background:rgba(255,255,255,.12); }
.rail button:hover { background:rgba(255,255,255,.08); color:var(--fg); }
.stage { grid-column:2; grid-row:2; min-width:0; position:relative; display:flex; align-items:center; justify-content:center; padding:42px; }
.slide { width:min(1280px, 100%); aspect-ratio:16/9; min-height:580px; border:1px solid var(--line); border-radius:var(--radius); background:linear-gradient(145deg, rgba(255,255,255,.08), rgba(255,255,255,.025)); box-shadow:var(--shadow); padding:56px; overflow:hidden; position:relative; }
.slide::after { content:""; position:absolute; inset:auto 40px 36px 40px; height:1px; background:linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent); }
.progress-wrap { position:absolute; left:42px; right:42px; bottom:22px; height:3px; background:rgba(255,255,255,.08); border-radius:99px; overflow:hidden; }
.progress { height:100%; width:0; background:var(--fg); transition:.35s ease; }
.notes-panel { grid-column:3; grid-row:2; border-left:1px solid var(--line); background:rgba(5,5,5,.78); backdrop-filter:blur(24px); padding:20px; overflow:auto; display:flex; flex-direction:column; gap:16px; z-index:10; }
.notes-head { display:flex; justify-content:space-between; align-items:center; color:var(--muted); }
#timer { font-variant-numeric: tabular-nums; color:var(--fg); }
.notes { line-height:1.72; color:#d8d8d2; font-size:15px; white-space:pre-wrap; }
.notes-controls { display:flex; gap:8px; flex-wrap:wrap; margin-top:auto; }
.blackout { position:fixed; inset:0; z-index:100; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size: clamp(56px, 10vw, 160px); letter-spacing:.08em; font-weight:900; }
.blackout small { font-size:16px; color:var(--muted); letter-spacing:0; font-weight:500; }
.nav-controls { position:fixed; right:22px; bottom:22px; z-index:30; display:flex; gap:10px; align-items:center; }
.nav-float { border:1px solid var(--line); background:rgba(5,5,5,.72); backdrop-filter:blur(20px); border-radius:999px; cursor:pointer; padding:12px 16px; box-shadow:0 12px 40px rgba(0,0,0,.3); }
.nav-float.next { background:#f5f5f0; color:#050505; font-weight:800; }
.nav-float:hover { transform:translateY(-1px); background:rgba(255,255,255,.18); }
.nav-float.next:hover { background:#fff; }


.kicker { color:var(--muted); font-weight:700; letter-spacing:.14em; text-transform:uppercase; font-size:14px; margin-bottom:14px; }
h1, h2, h3, p { margin:0; }
h1 { font-size: clamp(56px, 6vw, 92px); line-height:.98; letter-spacing:-.075em; max-width:1050px; }
h2 { font-size: clamp(40px, 4.8vw, 70px); line-height:1.02; letter-spacing:-.055em; max-width:980px; }
h3 { font-size:24px; letter-spacing:-.03em; }
.lead { margin-top:26px; font-size:22px; line-height:1.55; color:#d0d0ca; max-width:860px; }
.big-number { font-size: clamp(64px, 9vw, 138px); line-height:.9; font-weight:900; letter-spacing:-.07em; }
.grid2 { display:grid; grid-template-columns:1.04fr .96fr; gap:42px; height:100%; align-items:center; }
.grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
.stack { display:flex; flex-direction:column; gap:18px; }
.card { border:1px solid var(--line); background:var(--panel); border-radius:24px; padding:24px; }
.card.white { background:#f5f5f0; color:#050505; }
.card .label { color:var(--muted); font-size:13px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; margin-bottom:8px; }
.white .label { color:#555; }
.metric { display:flex; align-items:flex-end; justify-content:space-between; gap:16px; }
.metric strong { font-size:42px; letter-spacing:-.055em; }
.metric span { color:var(--muted); font-size:14px; }
.white .metric span { color:#555; }
.badges { display:flex; gap:10px; flex-wrap:wrap; margin-top:24px; }
.badge { border:1px solid var(--line); border-radius:999px; padding:8px 12px; color:#deded8; font-size:13px; background:rgba(255,255,255,.055); }
.white-badge { border-color:#111; background:#111; color:#fff; }
.timeline { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; align-items:stretch; margin-top:30px; }
.step { border:1px solid var(--line); border-radius:20px; padding:18px; min-height:140px; position:relative; overflow:hidden; background:rgba(255,255,255,.045); }
.step b { display:block; font-size:24px; margin-bottom:8px; }
.step small { color:#cfcfc7; line-height:1.5; }
.step::before { content:attr(data-n); position:absolute; right:10px; bottom:-18px; color:rgba(255,255,255,.09); font-size:84px; font-weight:900; letter-spacing:-.08em; }
.chart { display:flex; gap:16px; align-items:end; min-height:280px; border-left:1px solid var(--line); border-bottom:1px solid var(--line); padding:22px 16px; }
.bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:end; gap:10px; height:260px; }
.bar { width:76%; border-radius:14px 14px 3px 3px; background:linear-gradient(180deg,#fff,rgba(255,255,255,.38)); min-height:6px; position:relative; transition:.4s cubic-bezier(.2,.9,.2,1); }
.bar em { position:absolute; top:-28px; left:50%; transform:translateX(-50%); font-style:normal; font-weight:800; font-size:14px; white-space:nowrap; }
.bar-label { color:#d6d6cf; font-size:13px; text-align:center; }
.axis-note { color:var(--muted); font-size:13px; margin-top:10px; }
.controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:20px; }
.toggle { border:1px solid var(--line); border-radius:999px; padding:9px 14px; background:rgba(255,255,255,.05); cursor:pointer; }
.toggle.active { background:#fff; color:#050505; }
.compare { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:26px; }
.quant-card { padding:22px; border-radius:24px; border:1px solid var(--line); background:rgba(255,255,255,.05); position:relative; overflow:hidden; min-height:214px; }
.quant-card.active { background:#f4f4ef; color:#050505; }
.quant-card h3 { margin-bottom:16px; }
.quant-card .speed { font-size:48px; font-weight:900; letter-spacing:-.06em; }
.quant-card p { color:var(--muted); line-height:1.5; margin-top:8px; font-size:15px; }
.quant-card.active p { color:#555; }
.insight { margin-top:24px; padding:24px; border-radius:26px; border:1px solid var(--line); background:rgba(255,255,255,.08); font-size:22px; line-height:1.55; }
.matrix { display:grid; grid-template-columns: 1fr 1fr; gap:18px; margin-top:30px; }
.cell { border:1px solid var(--line); border-radius:24px; padding:22px; min-height:145px; background:rgba(255,255,255,.045); }
.cell b { font-size:38px; letter-spacing:-.06em; }
.cell p { color:#cfcfc8; line-height:1.55; margin-top:10px; }
.split-line { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:22px; }
.mini-table { width:100%; border-collapse:separate; border-spacing:0 8px; font-size:15px; }
.mini-table th { color:var(--muted); text-align:left; font-size:12px; text-transform:uppercase; letter-spacing:.08em; padding:4px 10px; }
.mini-table td { background:rgba(255,255,255,.055); padding:10px; border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
.mini-table td:first-child { border-left:1px solid var(--line); border-radius:12px 0 0 12px; }
.mini-table td:last-child { border-right:1px solid var(--line); border-radius:0 12px 12px 0; }
.reveal { opacity:.15; filter:blur(3px); transition:.35s ease; }
.reveal.on { opacity:1; filter:none; }
.prompt-box { margin-top:30px; font-size:30px; line-height:1.35; letter-spacing:-.04em; border:1px solid var(--line); border-radius:26px; padding:26px; background:rgba(255,255,255,.055); }
.keyhint { position:absolute; right:44px; top:34px; color:var(--muted); font-size:13px; }
.code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size:15px; line-height:1.7; border:1px solid var(--line); border-radius:20px; padding:20px; color:#e9e9e3; background:#0d0d0d; }
.final-grid { display:grid; grid-template-columns:1.25fr .75fr; gap:26px; align-items:stretch; margin-top:30px; }
.quote { font-size:34px; line-height:1.25; letter-spacing:-.05em; }
.small { color:var(--muted); font-size:14px; line-height:1.55; }

@media (max-width: 1180px) {
  .app { grid-template-columns:0 1fr; }
  .rail { position:fixed; left:0; top:64px; bottom:0; width:72px; transform:translateX(-80px); transition:.25s ease; }
  .rail.open { transform:none; }
  .notes-panel { display:none; }
  .stage { grid-column:2; padding:22px; }
  .slide { padding:36px; min-height:auto; }
}
@media (max-width: 720px) {
  .nav-controls { right:12px; bottom:12px; }
  html, body { overflow:auto; }
  .app { display:block; height:auto; min-height:100vh; }
  .topbar { position:sticky; top:0; height:auto; padding:12px; gap:10px; flex-wrap:wrap; }
  .topbar-actions { width:100%; }
  .stage { padding:12px; display:block; }
  .slide { width:100%; min-height:740px; aspect-ratio:auto; padding:28px; }
  .grid2, .grid3, .compare, .matrix, .final-grid, .timeline { grid-template-columns:1fr; }
  h1 { font-size:52px; }
  h2 { font-size:40px; }
}

  </style>
</head>
<body tabindex="-1">
  <div id="app" class="app">
    <header class="topbar">
      <button id="menuBtn" class="icon-btn" aria-label="슬라이드 목록 열기">☰</button>
      <div class="brand">
        <span class="brand-dot"></span>
        <span>Quantization × Science QA</span>
      </div>
      <div class="topbar-actions">
        <button id="presenterBtn" class="pill-btn">Presenter</button>
        <button id="blackoutBtn" class="pill-btn">Blackout</button>
        <button id="fullscreenBtn" class="pill-btn">Fullscreen</button>
      </div>
    </header>

    <aside id="rail" class="rail" aria-label="슬라이드 탐색"></aside>

    <main class="stage" aria-live="polite">
      <section id="slide" class="slide"></section>
      <div class="progress-wrap"><div id="progress" class="progress"></div></div>
    </main>

    <aside id="notesPanel" class="notes-panel" aria-label="발표자 노트">
      <div class="notes-head">
        <strong>Presenter Notes</strong>
        <span id="timer">00:00</span>
      </div>
      <div id="notes" class="notes"></div>
      <div class="notes-controls">
        <button id="resetTimer" class="pill-btn">타이머 리셋</button>
        <button id="prevBtn" class="pill-btn">← 이전</button>
        <button id="nextBtn" class="pill-btn">다음 →</button>
      </div>
    </aside>

    <div id="blackout" class="blackout" hidden>
      <div>BLACKOUT</div>
      <small>B 또는 버튼으로 해제</small>
    </div>
    <div class="nav-controls" aria-label="발표 진행 버튼">
      <button id="prevFloat" class="nav-float" aria-label="이전 슬라이드">←</button>
      <button id="nextFloat" class="nav-float next" aria-label="다음 슬라이드">다음 →</button>
    </div>

  </div>

  <template id="barChartTemplate">
    <div class="chart" role="img" aria-label="데이터 차트"></div>
  </template>

  <script>
const data = {
  totals: [
    {q:'Q8_0', correct:42, acc:26.3, parse:1, time:39.25, speed:10.96, score:1.74},
    {q:'Q6_K', correct:42, acc:26.3, parse:1, time:31.96, speed:13.97, score:1.74},
    {q:'Q4_K_M', correct:41, acc:25.6, parse:2, time:30.69, speed:16.25, score:1.61}
  ],
  subjects: [
    {name:'물리학 I', q8:20.0, q6:20.0, q4:22.5},
    {name:'화학 I', q8:22.5, q6:22.5, q4:17.5},
    {name:'생명과학 I', q8:30.0, q6:32.5, q4:32.5},
    {name:'지구과학 I', q8:32.5, q6:30.0, q4:30.0}
  ],
  types: [
    {name:'개념 이해형', q8:52.4, q6:57.1, q4:57.1},
    {name:'계산 적용형', q8:22.4, q6:20.7, q4:20.7},
    {name:'과정·인과 추론형', q8:25.0, q6:25.0, q4:25.0},
    {name:'자료 해석형', q8:21.3, q6:21.3, q4:19.7}
  ],
  visual: [
    {name:'그림 없음', q8:37.5, q6:41.7, q4:37.5},
    {name:'그림 있음', q8:24.3, q6:23.5, q4:23.5}
  ],
  paired: [
    {pair:'Q8_0 vs Q6_K', both:40, left:2, right:2, wrong:116, p:1},
    {pair:'Q8_0 vs Q4_K_M', both:30, left:12, right:11, wrong:107, p:1},
    {pair:'Q6_K vs Q4_K_M', both:30, left:12, right:11, wrong:107, p:1}
  ]
};

const slides = [
  {
    title:'title',
    notes:'첫 문장은 짧게 갑니다. “이 발표는 모델을 크게 만드는 이야기가 아니라, 제한된 노트북에서 어떤 양자화 조건이 실제로 쓸 만한가를 검증한 결과입니다.”\n\n청중에게 오늘 볼 기준을 미리 못 박습니다: 정확도, 설명 품질, 속도, 안정성.',
    html:`<div class="keyhint">클릭 · 다음 버튼 · Space · Enter · ← → · B · P · O</div>
      <div class="kicker">2026 격물치지 프로젝트</div>
      <h1>LLM의 양자화 수준은<br/>과학 문제 풀이를 얼마나 흔드는가?</h1>
      <p class="lead">Gemma 4 E4B 모델을 Q8_0 · Q6_K · Q4_K_M으로 비교한 로컬 실행 실험. 결론부터 말하면, <b>정답률 차이는 작고 속도 차이는 컸다.</b></p>
      <div class="badges"><span class="badge">160문항</span><span class="badge">4개 과목</span><span class="badge">3개 양자화 조건</span><span class="badge">정적 웹 발표</span></div>`
  },
  {
    title:'question',
    notes:'핵심 질문을 하나로 좁힙니다. “모델을 가볍게 만들면 성능이 무너질까?”라는 단순한 질문처럼 보이지만, 실제로는 학습 도구의 신뢰성 문제입니다.\n\n여기서는 성능을 정답률 하나로 보지 않았다고 강조합니다.',
    html:`<div class="grid2">
      <div><div class="kicker">Research Question</div><h2>같은 모델을 더 거칠게 압축하면, 과학 문항 풀이 성능도 같이 무너질까?</h2><p class="lead">양자화는 메모리와 속도를 개선하지만, 계산·자료 해석·설명 품질을 손상시킬 수 있다.</p></div>
      <div class="stack">
        <div class="card white"><div class="label">독립변인</div><div class="metric"><strong>Q8 / Q6 / Q4</strong><span>양자화 수준</span></div></div>
        <div class="card"><div class="label">종속변인</div><p class="lead" style="font-size:19px;margin-top:0">정답률, 설명 점수, 오답 유형, 파싱 실패, 평균 시간, 생성 속도</p></div>
      </div></div>`
  },
  {
    title:'design',
    notes:'연구 설계의 신뢰성을 보여주는 슬라이드입니다. 비교 조건 외에는 모두 고정했다는 점이 중요합니다.\n\n“양자화만 바꿨다”는 말이 청중에게 남아야 합니다.',
    html:`<div class="kicker">Experiment Design</div><h2>변수 하나만 바꾸기 위해 나머지는 고정했다.</h2>
      <div class="timeline">
        <div class="step" data-n="1"><b>160</b><small>물리·화학·생명·지구과학 각 40문항</small></div>
        <div class="step" data-n="2"><b>동일 모델</b><small>Gemma 4 E4B 계열, 양자화 조건만 변경</small></div>
        <div class="step" data-n="3"><b>동일 입력</b><small>문항 순서, 프롬프트, 그림·표 제공 방식 통제</small></div>
        <div class="step" data-n="4"><b>자동 채점</b><small>선택지 번호를 공식 정답표와 비교</small></div>
        <div class="step" data-n="5"><b>LLM 평가</b><small>설명 품질 0~5점, 오답 유형 복수 분류</small></div>
      </div>`
  },
  {
    title:'prediction',
    notes:'여기는 청중 참여 지점입니다. 발표 중 실제로 손들게 해도 됩니다. 버튼을 누르면 결과가 드러납니다.\n\n질문: “가장 실용적인 조건은 무엇일까요?” 대부분 Q8 또는 Q4를 고를 가능성이 큽니다. 그런 다음 Q6의 절충성이 핵심이라고 전환합니다.',
    html:`<div class="kicker">Audience Check</div><h2>예상해 봅시다. 가장 실용적인 양자화 조건은?</h2>
      <div class="prompt-box">정확도는 유지하면서, 로컬 노트북에서 더 빠르게 돌아가는 조건은 무엇일까?</div>
      <div class="compare">

let current = 0;
let presenter = true;
let startTime = Date.now();
const slideEl = document.getElementById('slide');
const railEl = document.getElementById('rail');
const notesEl = document.getElementById('notes');
const notesPanel = document.getElementById('notesPanel');
const progressEl = document.getElementById('progress');
const timerEl = document.getElementById('timer');

function renderRail() {
  railEl.innerHTML = slides.map((s,i)=>`<button title="${i+1}. ${s.title}" class="${i===current?'active':''}" data-go="${i}">${String(i+1).padStart(2,'0')}</button>`).join('');
  railEl.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => go(+btn.dataset.go)));
}
function go(i) {
  current = Math.max(0, Math.min(slides.length-1, i));
  render();
}
function next(){ go(current+1); }
function prev(){ go(current-1); }
function render() {
  slideEl.innerHTML = slides[current].html;
  notesEl.textContent = slides[current].notes;
  progressEl.style.width = `${((current+1)/slides.length)*100}%`;
  renderRail();
  hydrate();
}
function makeBars(rows, key, max=60, suffix='%') {
  const el = document.createElement('div');
  el.className = 'chart';
  rows.forEach(r => {
    const v = r[key];
    const h = Math.max(8, (v/max)*230);
    const label = r.q || r.name;
    el.innerHTML += `<div class="bar-wrap"><div class="bar" style="height:${h}px"><em>${v}${suffix}</em></div><div class="bar-label">${label}</div></div>`;
  });
  return el;
}
function hydrate() {
  if (document.getElementById('overallChart')) renderOverall('acc');
  if (document.getElementById('quantCompare')) renderQuantCompare('Q6_K');
  if (document.getElementById('subjectChart')) renderSubject('q8');
  if (document.getElementById('typeChart')) {
    document.getElementById('typeChart').appendChild(makeBars(data.types.map(x=>({name:x.name, q:x.name, v:x.q6, value:x.q6})), 'value', 60, '%'));
  }
  if (document.getElementById('visualChart')) {
    const rows = [
      {name:'그림 없음 Q6', value:41.7},
      {name:'그림 있음 Q6', value:23.5}
    ];
    document.getElementById('visualChart').appendChild(makeBars(rows, 'value', 50, '%'));
  }
  document.querySelectorAll('.toggle[data-chart]').forEach(btn => btn.addEventListener('click', () => renderOverall(btn.dataset.chart)));
  document.querySelectorAll('.toggle[data-subject]').forEach(btn => btn.addEventListener('click', () => renderSubject(btn.dataset.subject)));
  document.querySelectorAll('.vote').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('.vote').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('voteResult')?.classList.add('on');
  }));
}
function renderOverall(kind) {
  const target = document.getElementById('overallChart');
  if(!target) return;
  target.innerHTML = '';
  let rows, key, max, suffix, note;
  if(kind==='speed') { rows = data.totals.map(x=>({...x, value:x.speed})); key='value'; max=18; suffix=' tok/s'; note='Q8_0 10.96, Q6_K 13.97, Q4_K_M 16.25 tok/s'; }
  else if(kind==='score') { rows = data.totals.map(x=>({...x, value:x.score})); key='value'; max=5; suffix='점'; note='Q8_0 1.74점, Q6_K 1.74점, Q4_K_M 1.61점'; }
  else { rows = data.totals.map(x=>({...x, value:x.acc})); key='value'; max=35; suffix='%'; note='Q8_0 26.3%, Q6_K 26.3%, Q4_K_M 25.6%'; }
  target.appendChild(makeBars(rows, key, max, suffix));
  document.getElementById('chartNote').textContent = note;
  document.querySelectorAll('.toggle[data-chart]').forEach(b=>b.classList.toggle('active', b.dataset.chart===kind));
}
function renderQuantCompare(active) {
  const target = document.getElementById('quantCompare');
  if(!target) return;
  target.innerHTML = data.totals.map(x => `<button class="quant-card ${x.q===active?'active':''}" data-q="${x.q}"><h3>${x.q}</h3><div class="speed">${x.speed}</div><p>tok/s · 정답률 ${x.acc}% · 설명 ${x.score}점 · 파싱 실패 ${x.parse}회</p></button>`).join('');
  const insight = {
    'Q8_0':'가장 보수적인 선택이다. 하지만 이 실험에서는 Q6_K보다 정답률이나 설명 품질 우위가 없었다.',
    'Q6_K':'가장 실용적인 선택이다. Q8_0과 같은 정답률·설명 평균을 유지하면서 약 27% 빠른 생성 속도를 보였다.',
    'Q4_K_M':'가장 빠르다. 다만 설명 평균이 가장 낮고 파싱 실패도 2회로 가장 많았다. 학습용 답변에는 검증이 필요하다.'
  };
  document.getElementById('quantInsight').innerHTML = insight[active];
  target.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => renderQuantCompare(btn.dataset.q)));
}
function renderSubject(key) {
  const target = document.getElementById('subjectChart');
  if(!target) return;
  target.innerHTML = '';
  const rows = data.subjects.map(x=>({name:x.name, value:x[key]}));
  target.appendChild(makeBars(rows, 'value', 40, '%'));
  document.querySelectorAll('.toggle[data-subject]').forEach(b=>b.classList.toggle('active', b.dataset.subject===key));
}
function updateTimer(){
  const sec = Math.floor((Date.now()-startTime)/1000);
  const m = String(Math.floor(sec/60)).padStart(2,'0');
  const s = String(sec%60).padStart(2,'0');
  timerEl.textContent = `${m}:${s}`;
}
setInterval(updateTimer, 500);

safeOn('nextBtn', 'click', next);
safeOn('prevBtn', 'click', prev);
safeOn('nextFloat', 'click', next);
safeOn('prevFloat', 'click', prev);
safeOn('resetTimer', 'click', () => { startTime = Date.now(); updateTimer(); });
safeOn('presenterBtn', 'click', () => {
  presenter = !presenter;
  notesPanel.style.display = presenter ? 'flex' : 'none';
});
safeOn('fullscreenBtn', 'click', () => {
  if(!document.fullscreenElement) document.documentElement.requestFullscreen?.(); else document.exitFullscreen?.();
  document.activeElement?.blur?.();
  document.body.focus?.();
});
safeOn('blackoutBtn', 'click', toggleBlackout);
safeOn('menuBtn', 'click', () => railEl.classList.toggle('open'));
function safeOn(id, event, handler){
  const el = document.getElementById(id);
  if(el) el.addEventListener(event, handler);
}
function toggleBlackout(){
  const el = document.getElementById('blackout');
  if(el) el.hidden = !el.hidden;
}

function handleKey(e) {
  if (e.defaultPrevented || e.altKey || e.ctrlKey || e.metaKey) return;
  const key = e.key;
  const code = e.code;
  const lower = typeof key === 'string' ? key.toLowerCase() : '';
  const forward = key === 'ArrowRight' || key === 'ArrowDown' || key === 'PageDown' || key === 'Enter' || key === ' ' || key === 'Spacebar' || code === 'Space' || lower === 'n' || lower === 'l';
  const back = key === 'ArrowLeft' || key === 'ArrowUp' || key === 'PageUp' || lower === 'j';
  if(forward) { e.preventDefault(); next(); return; }
  if(back) { e.preventDefault(); prev(); return; }
  if(lower === 'b') { e.preventDefault(); toggleBlackout(); return; }
  if(lower === 'p') { e.preventDefault(); document.getElementById('presenterBtn')?.click(); return; }
  if(lower === 'o') { e.preventDefault(); railEl.classList.toggle('open'); return; }
  if(key === 'Home') { e.preventDefault(); go(0); return; }
  if(key === 'End') { e.preventDefault(); go(slides.length-1); return; }
}
window.addEventListener('keydown', handleKey, true);
document.addEventListener('click', (e) => {
  const interactive = e.target.closest?.('button, a, input, textarea, select, [role=button]');
  if(interactive) return;
  const blackout = document.getElementById('blackout');
  if(blackout && !blackout.hidden) { toggleBlackout(); return; }
  if(e.target.closest?.('.slide, .stage')) next();
});
let touchStartX = null;
document.addEventListener('touchstart', e => { touchStartX = e.changedTouches?.[0]?.clientX ?? null; }, {passive:true});
document.addEventListener('touchend', e => {
  if(touchStartX === null) return;
  const endX = e.changedTouches?.[0]?.clientX ?? touchStartX;
  const dx = endX - touchStartX;
  if(Math.abs(dx) > 50) dx < 0 ? next() : prev();
  touchStartX = null;
}, {passive:true});
window.addEventListener('load', () => document.body.focus?.());
render();

  </script>
</body>
